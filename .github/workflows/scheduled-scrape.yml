name: Scheduled Scrape

on:
  schedule:
    # Run every 6 hours at minute 0
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual content refresh'

env:
  # API URL — served via Docker + Traefik on VPS
  API_URL: https://api.airopa.news
  # API key for authenticated endpoints (required for /api/scrape)
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  scrape:
    name: Trigger Content Scrape
    runs-on: ubuntu-latest

    steps:
      - name: Display trigger info
        run: |
          echo "Scrape triggered at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Reason: ${{ github.event.inputs.reason }}"
          fi

      - name: Check API health
        id: health
        run: |
          echo "Checking API health..."
          HEALTH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 30 \
            --connect-timeout 10 \
            "${{ env.API_URL }}/api/health")
          HTTP_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
          BODY=$(echo "$HEALTH_RESPONSE" | sed '$d')

          echo "Health response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API health check failed with status $HTTP_CODE"
            exit 1
          fi

          echo "API is healthy"

      - name: Run scrape
        id: scrape
        run: |
          # Check if API key is configured
          if [ -z "${{ env.API_KEY }}" ]; then
            echo "::error::API_KEY secret is not configured. Please add it to repository secrets."
            exit 1
          fi

          # ---------------------------------------------------------
          # Strategy: use async + polling as the primary approach.
          #
          # The sync endpoint (/api/scrape/sync) holds the connection
          # open for the full pipeline run.  Traefik and other proxies
          # tend to drop idle connections well before the pipeline
          # finishes, which kills the uvicorn worker and leaves the
          # server unable to handle the subsequent async fallback (404).
          #
          # Async is more resilient: the POST returns immediately with
          # a job_id, and we poll /api/jobs/{id} until it completes.
          # ---------------------------------------------------------

          echo "Triggering async scrape..."
          ASYNC_EXIT=0
          ASYNC_RESPONSE=$(curl -s -w "\n%{http_code}" \
            --max-time 60 \
            --connect-timeout 30 \
            -X POST "${{ env.API_URL }}/api/scrape" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ env.API_KEY }}") || ASYNC_EXIT=$?

          if [ "$ASYNC_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code $ASYNC_EXIT"
            exit 1
          fi

          ASYNC_CODE=$(echo "$ASYNC_RESPONSE" | tail -n1)
          ASYNC_BODY=$(echo "$ASYNC_RESPONSE" | sed '$d')

          echo "HTTP status: $ASYNC_CODE"
          echo "Response: $ASYNC_BODY"

          if [ "$ASYNC_CODE" != "200" ]; then
            echo "::error::Scrape request failed with HTTP $ASYNC_CODE"
            echo "::error::Response: $ASYNC_BODY"
            exit 1
          fi

          JOB_ID=$(echo "$ASYNC_BODY" | grep -o '"job_id":"[^"]*"' | sed 's/"job_id":"//;s/"//')

          if [ -z "$JOB_ID" ]; then
            echo "::error::Could not extract job_id from response"
            exit 1
          fi

          echo "Job started: $JOB_ID"
          echo "Polling for completion (max 20 min)..."

          # Poll every 30 seconds for up to 20 minutes (40 attempts)
          ATTEMPTS=0
          MAX_ATTEMPTS=40
          CONSECUTIVE_ERRORS=0
          MAX_CONSECUTIVE_ERRORS=5

          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            sleep 30
            ATTEMPTS=$((ATTEMPTS + 1))

            POLL_EXIT=0
            POLL_RESPONSE=$(curl -s -w "\n%{http_code}" \
              --max-time 30 \
              --connect-timeout 10 \
              "${{ env.API_URL }}/api/jobs/$JOB_ID") || POLL_EXIT=$?

            if [ "$POLL_EXIT" -ne 0 ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  Poll $ATTEMPTS/$MAX_ATTEMPTS — curl failed (exit $POLL_EXIT) [$CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS consecutive errors]"
              if [ "$CONSECUTIVE_ERRORS" -ge "$MAX_CONSECUTIVE_ERRORS" ]; then
                echo "::error::Too many consecutive poll failures — server may be down"
                exit 1
              fi
              continue
            fi

            POLL_CODE=$(echo "$POLL_RESPONSE" | tail -n1)
            POLL_BODY=$(echo "$POLL_RESPONSE" | sed '$d')

            if [ "$POLL_CODE" != "200" ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  Poll $ATTEMPTS/$MAX_ATTEMPTS — unexpected HTTP $POLL_CODE [$CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS consecutive errors]"
              if [ "$CONSECUTIVE_ERRORS" -ge "$MAX_CONSECUTIVE_ERRORS" ]; then
                echo "::error::Too many consecutive poll failures — server may be down"
                exit 1
              fi
              continue
            fi

            # Reset consecutive error counter on successful 200 response
            CONSECUTIVE_ERRORS=0

            STATUS=$(echo "$POLL_BODY" | grep -o '"status":"[^"]*"' | sed 's/"status":"//;s/"//')
            echo "  Poll $ATTEMPTS/$MAX_ATTEMPTS — status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              RESULT_COUNT=$(echo "$POLL_BODY" | grep -o '"result_count":[0-9]*' | sed 's/"result_count"://')
              echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
              echo "status=completed" >> $GITHUB_OUTPUT
              echo "result_count=$RESULT_COUNT" >> $GITHUB_OUTPUT
              echo "Scrape completed successfully!"
              echo "Articles stored: $RESULT_COUNT"
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              ERROR_MSG=$(echo "$POLL_BODY" | grep -o '"error_message":"[^"]*"' | sed 's/"error_message":"//;s/"//')
              echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "::error::Scrape job failed: $ERROR_MSG"
              exit 1
            fi
          done

          echo "::error::Timed out waiting for scrape job $JOB_ID to complete after 20 minutes"
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
          echo "status=timeout" >> $GITHUB_OUTPUT
          exit 1

      - name: Report results
        if: always()
        run: |
          echo "============================================"
          echo "SCRAPE JOB SUMMARY"
          echo "============================================"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Job ID: ${{ steps.scrape.outputs.job_id || 'N/A' }}"
          echo "Status: ${{ steps.scrape.outputs.status || 'unknown' }}"
          echo "Articles stored: ${{ steps.scrape.outputs.result_count || 'N/A' }}"
          echo "============================================"
