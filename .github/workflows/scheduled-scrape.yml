name: Scheduled Scrape

on:
  schedule:
    # Run every 6 hours at minute 0
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual content refresh'

env:
  # API URL — served via Docker + Traefik on VPS
  API_URL: https://api.airopa.news
  # API key for authenticated endpoints (required for /api/scrape)
  API_KEY: ${{ secrets.API_KEY }}

jobs:
  scrape:
    name: Trigger Content Scrape
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Display trigger info
        run: |
          echo "Scrape triggered at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Trigger: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Reason: ${{ github.event.inputs.reason }}"
          fi

      - name: Check API health
        id: health
        run: |
          echo "Checking API health..."
          HEALTH_RESPONSE=$(curl -s -w "\n%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            "${{ env.API_URL }}/api/health")
          HTTP_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
          BODY=$(echo "$HEALTH_RESPONSE" | sed '$d')

          echo "Health response: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API health check failed with status $HTTP_CODE"
            exit 1
          fi

          echo "API is healthy"

      - name: Trigger async scrape
        id: trigger
        run: |
          # Check if API key is configured
          if [ -z "${{ env.API_KEY }}" ]; then
            echo "::error::API_KEY secret is not configured. Please add it to repository secrets."
            exit 1
          fi

          echo "Triggering async scrape..."

          # Call async endpoint — returns immediately with job_id
          ASYNC_EXIT=0
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            --connect-timeout 15 \
            --max-time 30 \
            -X POST "${{ env.API_URL }}/api/scrape" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ env.API_KEY }}") || ASYNC_EXIT=$?

          if [ "$ASYNC_EXIT" -ne 0 ]; then
            echo "::error::curl failed with exit code $ASYNC_EXIT"
            exit 1
          fi

          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n1)
          BODY=$(echo "$HTTP_RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Failed to trigger scrape (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi

          # Extract job_id
          JOB_ID=$(echo "$BODY" | grep -o '"job_id":"[^"]*"' | sed 's/"job_id":"//;s/"//')

          if [ -z "$JOB_ID" ]; then
            echo "::error::No job_id returned in response"
            exit 1
          fi

          echo "Job started: $JOB_ID"
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      - name: Poll for completion
        id: scrape
        run: |
          JOB_ID="${{ steps.trigger.outputs.job_id }}"
          MAX_POLLS=60
          POLL_INTERVAL=30
          MAX_WAIT_MIN=$(( MAX_POLLS * POLL_INTERVAL / 60 ))
          CONSECUTIVE_ERRORS=0
          MAX_CONSECUTIVE_ERRORS=5

          echo "Polling for completion (max ${MAX_WAIT_MIN} min)..."

          for i in $(seq 1 $MAX_POLLS); do
            # Short request — just fetching job status
            POLL_EXIT=0
            POLL_RESPONSE=$(curl -s -w "\n%{http_code}" \
              --connect-timeout 10 \
              --max-time 15 \
              "${{ env.API_URL }}/api/jobs/$JOB_ID") || POLL_EXIT=$?

            if [ "$POLL_EXIT" -ne 0 ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  Poll $i/$MAX_POLLS — curl failed (exit $POLL_EXIT) [$CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS consecutive errors]"
              if [ "$CONSECUTIVE_ERRORS" -ge "$MAX_CONSECUTIVE_ERRORS" ]; then
                echo "::error::Too many consecutive poll failures — server may be down"
                exit 1
              fi
              sleep $POLL_INTERVAL
              continue
            fi

            HTTP_CODE=$(echo "$POLL_RESPONSE" | tail -n1)
            BODY=$(echo "$POLL_RESPONSE" | sed '$d')

            # Handle transient network/proxy errors gracefully
            if [ "$HTTP_CODE" != "200" ]; then
              CONSECUTIVE_ERRORS=$((CONSECUTIVE_ERRORS + 1))
              echo "  Poll $i/$MAX_POLLS — HTTP $HTTP_CODE [$CONSECUTIVE_ERRORS/$MAX_CONSECUTIVE_ERRORS consecutive errors]"
              if [ "$CONSECUTIVE_ERRORS" -ge "$MAX_CONSECUTIVE_ERRORS" ]; then
                echo "::error::Too many consecutive poll failures — server may be down"
                exit 1
              fi
              sleep $POLL_INTERVAL
              continue
            fi

            # Reset consecutive error counter on successful response
            CONSECUTIVE_ERRORS=0

            STATUS=$(echo "$BODY" | grep -o '"status":"[^"]*"' | sed 's/"status":"//;s/"//')

            if [ "$STATUS" = "completed" ]; then
              RESULT_COUNT=$(echo "$BODY" | grep -o '"result_count":[0-9]*' | sed 's/"result_count"://')
              echo "Scrape completed successfully!"
              echo "Articles stored: ${RESULT_COUNT:-0}"
              echo "status=completed" >> $GITHUB_OUTPUT
              echo "result_count=${RESULT_COUNT:-0}" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "failed" ]; then
              ERROR_MSG=$(echo "$BODY" | grep -o '"error_message":"[^"]*"' | sed 's/"error_message":"//;s/"//')
              echo "::error::Scrape job failed: $ERROR_MSG"
              echo "status=failed" >> $GITHUB_OUTPUT
              echo "error_message=$ERROR_MSG" >> $GITHUB_OUTPUT
              exit 1
            fi

            # Still queued or running
            echo "  Poll $i/$MAX_POLLS — status: $STATUS"
            sleep $POLL_INTERVAL
          done

          echo "::error::Timed out waiting for scrape job $JOB_ID to complete after ${MAX_WAIT_MIN} minutes"
          echo "status=timeout" >> $GITHUB_OUTPUT
          exit 1

      - name: Report results
        if: always()
        run: |
          echo "============================================"
          echo "SCRAPE JOB SUMMARY"
          echo "============================================"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Job ID: ${{ steps.trigger.outputs.job_id || 'N/A' }}"
          echo "Status: ${{ steps.scrape.outputs.status || 'unknown' }}"
          echo "Articles stored: ${{ steps.scrape.outputs.result_count || 'N/A' }}"
          echo "============================================"
